name: morning-news

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests playwright
        python -m playwright install chromium

    - name: 校验脚本语法
      run: python -m py_compile main.py

    - name: 运行脚本
      run: python main.py
      env:
        WEBHOOK: ${{ secrets.WEBHOOK }}
