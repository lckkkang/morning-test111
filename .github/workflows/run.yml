name: morning-news

on:
  schedule:
    # 每天早上 7:30（北京时间）
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ 拉取代码
    - name: Checkout
      uses: actions/checkout@v3

    # 2️⃣ 安装 Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3️⃣ 安装依赖
    - name: Install dependencies
      run: |
        pip install requests playwright
        python -m playwright install chromium

    # 4️⃣ 运行脚本
    - name: Run main
      run: python main.py
      env:
        WEBHOOK: ${{ secrets.WEBHOOK }}
